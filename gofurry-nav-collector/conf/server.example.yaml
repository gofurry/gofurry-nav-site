cluster_id: 1

server:
  app_name: "GF-Nav-Collector"
  app_version: "v1.0.0"
  mode: "debug"
  memory_limit: 1

data_base:
  db_name: "gfn"
  db_username: "postgres"
  db_password: "CHANGE_ME"
  db_host: "127.0.0.1"
  db_port: "5432"
  max_open_conns: 20
  max_idle_conns: 5
  conn_max_lifetime_seconds: 300
  conn_max_idle_time_seconds: 60

redis:
  redis_addr: "127.0.0.1:6379"
  redis_password: "CHANGE_ME"

log:
  log_rotation_count: 10
  log_path: "./logs"
  log_level: "info"
  log_choke_length: 1000

collector:
  proxy: ""
  probe_budget:
    redis_timeout_seconds: 2
    http_timeout_seconds: 25
    http_redirects: 5
    tls_handshake_timeout_seconds: 5
    dns_timeout_seconds: 5
    ptr_timeout_seconds: 2
    max_dns_records_per_query: 64
    max_response_bytes: 1048576
  scheduler:
    collector_id: ""
    lease_enabled: false
    lease_ttl_seconds: 0
    run_state_redis: true
    run_state_ttl_hours: 168
  v2:
    enabled: false
    observation_db: false
    latest_redis: false
    compare_log: false
    protocols:
      ping: false
      http: false
      dns: false
    edge_hints:
      enabled: true
    derived:
      trend_enabled: true
      change_enabled: true
      min_interval_seconds: 300
      query_timeout_seconds: 2
      trend_max_rows: 3000
      change_max_rows: 80
    light_probe:
      rdap:
        enabled: false
        interval_hours: 168
        timeout_seconds: 10
        run_on_start: false
      robots:
        enabled: false
        interval_hours: 168
        timeout_seconds: 10
        max_response_bytes: 65536
        max_sitemap_links: 20
        run_on_start: false
      security_txt:
        enabled: false
        interval_hours: 168
        timeout_seconds: 10
        max_response_bytes: 65536
        run_on_start: false
      page_assets:
        enabled: false
        interval_hours: 168
        timeout_seconds: 10
        max_icon_bytes: 262144
        max_manifest_bytes: 65536
        allowed_asset_hosts: []
        run_on_start: false
      port_check:
        enabled: false
        interval_hours: 168
        timeout_seconds: 2
        concurrency: 8
        max_ports_per_target: 24
        ports: []
        run_on_start: false
      waf_canary:
        enabled: false
        interval_hours: 720
        timeout_seconds: 10
        canary_path: "/.well-known/gofurry-waf-canary"
        user_agent: "GoFurry-Nav-Collector-WAF-Canary/1.0"
        run_on_start: false
        max_targets_per_run: 0
  ping:
    ping_thread: 5
    ping_interval: 600
    ping_key: "ping:sites"
    result_key: "ping:result"
    log_count: "288"
  request:
    request_thread: 3
    request_interval: 6
    log_count: "240"
  dns:
    dns_thread: 3
    query_thread: 10
    dns_interval: 24
    resolver: "8.8.8.8:53"
    geolite2_path: "./data/"
    log_count: "60"
