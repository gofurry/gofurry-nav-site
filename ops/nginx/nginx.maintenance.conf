user gofurry;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

worker_rlimit_nofile 10240;

http {
    include /home/gofurry/gfs/public/cdn-allow.conf;
    include mime.types;
    default_type application/octet-stream;

    log_format main escape=json '$remote_addr - $remote_user [$time_local] "$request" '
                                '$status $body_bytes_sent "$request_body" "$http_referer" '
                                '"$http_user_agent" "$http_x_forwarded_for" "$upstream_addr" $request_time $upstream_response_time';
    access_log /var/log/nginx/access.log main;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay off;
    keepalive_timeout 65;
    reset_timedout_connection on;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 3;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_vary on;

    server {
        listen 80;
        listen [::]:80;
        server_name go-furry.com www.go-furry.com nav.go-furry.com game.go-furry.com op.go-furry.com rag.go-furry.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://go-furry.com;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate /home/gofurry/gfs/key/ssl/fullchain.pem;
        ssl_certificate_key /home/gofurry/gfs/key/ssl/privkey.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://go-furry.com$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;
        http2 on;

        server_name go-furry.com www.go-furry.com nav.go-furry.com game.go-furry.com op.go-furry.com rag.go-furry.com;
        root /home/gofurry/gfs/gofurry-repo/gofurry-nav-site/unavailable;
        index index.html;

        ssl_certificate /home/gofurry/gfs/key/ssl/fullchain.pem;
        ssl_certificate_key /home/gofurry/gfs/key/ssl/privkey.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_buffer_size 1400;
        ssl_early_data on;

        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header QUIC-Status "enabled" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Retry-After "3600" always;

        error_page 404 500 502 503 504 /index.html;

        location = /healthz {
            access_log off;
            add_header Cache-Control "no-store" always;
            return 200 "maintenance\n";
        }

        location = /index.html {
            try_files /index.html =503;
        }

        location / {
            return 503;
        }
    }
}
