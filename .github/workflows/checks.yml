          cache-dependency-path: ops/gofurry-ops-center/go.sum

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          cd ops/gofurry-ops-center
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "${files}"
            exit 1
          fi

      - name: Build center console
        shell: bash
        run: |
          set -euo pipefail
          cd ops/gofurry-ops-center/web
          npm ci
          npm run build

      - name: Go vet
        working-directory: ops/gofurry-ops-center
        run: go vet ./...

      - name: Go test
        working-directory: ops/gofurry-ops-center
        run: go test ./...

      - name: Go build
        working-directory: ops/gofurry-ops-center
        run: go build -trimpath -ldflags="-s -w" -o /tmp/gofurry-ops-center ./cmd/center

  gofurry-nav-backend:
