name: checks

on:
  push:
    paths:
      - 'gofurry-admin/**'
      - 'gofurry-game-backend/**'
      - 'gofurry-game-collector/**'
      - 'gofurry-nav-backend/**'
      - 'gofurry-nav-collector/**'
      - 'gofurry-nav-frontend/**'
      - 'gofurry-rag/**'
      - 'ops/gofurry-ops-agent/**'
      - 'ops/gofurry-ops-center/**'
      - '.github/workflows/checks.yml'
  pull_request:
    paths:
      - 'gofurry-admin/**'
      - 'gofurry-game-backend/**'
      - 'gofurry-game-collector/**'
      - 'gofurry-nav-backend/**'
      - 'gofurry-nav-collector/**'
      - 'gofurry-nav-frontend/**'
      - 'gofurry-rag/**'
      - 'ops/gofurry-ops-agent/**'
      - 'ops/gofurry-ops-center/**'
      - '.github/workflows/checks.yml'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gofurry_admin: ${{ steps.detect.outputs.gofurry_admin }}
      gofurry_game_backend: ${{ steps.detect.outputs.gofurry_game_backend }}
      gofurry_game_collector: ${{ steps.detect.outputs.gofurry_game_collector }}
      gofurry_nav_backend: ${{ steps.detect.outputs.gofurry_nav_backend }}
      gofurry_nav_collector: ${{ steps.detect.outputs.gofurry_nav_collector }}
      gofurry_nav_frontend: ${{ steps.detect.outputs.gofurry_nav_frontend }}
      gofurry_rag: ${{ steps.detect.outputs.gofurry_rag }}
      gofurry_ops_agent: ${{ steps.detect.outputs.gofurry_ops_agent }}
      gofurry_ops_center: ${{ steps.detect.outputs.gofurry_ops_center }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="${{ github.event.before }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git ls-files)"
          else
            changed_files="$(git diff --name-only "${base_sha}" "${{ github.sha }}")"
          fi

          printf '%s\n' "${changed_files}"

          set_output() {
            local name="$1"
            local pattern="$2"
            if printf '%s\n' "${changed_files}" | grep -Eq "${pattern}"; then
              echo "${name}=true" >> "${GITHUB_OUTPUT}"
            else
              echo "${name}=false" >> "${GITHUB_OUTPUT}"
            fi
          }

          set_output "gofurry_admin" '^gofurry-admin/'
          set_output "gofurry_game_backend" '^gofurry-game-backend/'
          set_output "gofurry_game_collector" '^gofurry-game-collector/'
          set_output "gofurry_nav_backend" '^gofurry-nav-backend/'
          set_output "gofurry_nav_collector" '^gofurry-nav-collector/'
          set_output "gofurry_nav_frontend" '^gofurry-nav-frontend/'
          set_output "gofurry_rag" '^gofurry-rag/'
          set_output "gofurry_ops_agent" '^ops/gofurry-ops-agent/'
          set_output "gofurry_ops_center" '^ops/gofurry-ops-center/'

  gofurry-admin:
    needs: detect-changes
    if: needs.detect-changes.outputs.gofurry_admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: gofurry-admin/go.mod
          cache-dependency-path: gofurry-admin/go.sum

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          cd gofurry-admin
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "${files}"
            exit 1
          fi

      - name: Build admin web
        shell: bash
        run: |
          set -euo pipefail
          cd gofurry-admin/web
          npm ci
          npm run build

      - name: Go vet
        working-directory: gofurry-admin
        run: go vet ./...

      - name: Go test
        working-directory: gofurry-admin
        run: go test ./...

  gofurry-rag:
    needs: detect-changes
    if: needs.detect-changes.outputs.gofurry_rag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: gofurry-rag/go.mod
          cache-dependency-path: gofurry-rag/go.sum

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          cd gofurry-rag
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "${files}"
            exit 1
          fi

      - name: Build rag console
        shell: bash
        run: |
          set -euo pipefail
          cd gofurry-rag/web
          npm ci
          npm run build

      - name: Go vet
        working-directory: gofurry-rag
        run: go vet ./...

      - name: Go test
        working-directory: gofurry-rag
        run: go test ./...

  gofurry-ops-agent:
    needs: detect-changes
    if: needs.detect-changes.outputs.gofurry_ops_agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ops/gofurry-ops-agent/go.mod
          cache-dependency-path: ops/gofurry-ops-agent/go.sum

      - name: Check gofmt
        shell: bash
        run: |
          set -euo pipefail
          cd ops/gofurry-ops-agent
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "${files}"
            exit 1
          fi

      - name: Go vet
        working-directory: ops/gofurry-ops-agent
        run: go vet ./...

      - name: Go test
        working-directory: ops/gofurry-ops-agent
        run: go test ./...

      - name: Go build
        working-directory: ops/gofurry-ops-agent
        run: go build -trimpath -ldflags="-s -w" -o /tmp/gofurry-ops-agent ./cmd/agent

  gofurry-ops-center:
    needs: detect-changes
    if: needs.detect-changes.outputs.gofurry_ops_center == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
