      - name: Go vet
        working-directory: gofurry-nav-collector
        run: go vet ./...

      - name: Go test
        working-directory: gofurry-nav-collector
        run: go test ./...

  gofurry-game-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.gofurry_game_backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
